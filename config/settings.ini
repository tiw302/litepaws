# LitePaws Configuration File

# Window Settings
width=128
height=128

# Behavior Toggles (1 = Enabled, 0 = Disabled)
can_walk=1
can_sleep=1
can_drag=1
can_click=1

# Movement Settings
walk_speed=60.0
gravity=500.0

# Animation Settings
# Time in seconds between frames
frame_duration=0.5

# Animation Frame Counts
# Files must be named 1.png, 2.png, etc. in their respective folders:
# assets/idle/, assets/walk/, assets/sleep/, assets/drag/
idle_frames=1
walk_frames=2
sleep_frames=2
drag_frames=1
